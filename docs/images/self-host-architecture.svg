<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 600" width="1240" height="600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Self-hosting architecture: a browser or desktop app loads the static web app (host it on Docker, Vercel, Netlify or Cloudflare Pages) and connects over an encrypted WebSocket to the relay (host it on Docker, Fly.io, Railway, Render or a VPS). The relay only ever sees hashed room names and end-to-end-encrypted ciphertext.">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#34d399"/>
    </marker>
    <marker id="arrowMuted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#6f8c7d"/>
    </marker>
    <style>
      .h     { fill:#eafaf1; font-size:30px; font-weight:700; }
      .sub   { fill:#9fb8aa; font-size:16px; }
      .card-t{ fill:#eafaf1; font-size:21px; font-weight:700; }
      .card-s{ fill:#86c8a4; font-size:13.5px; font-weight:600; letter-spacing:.5px; }
      .card-d{ fill:#9fb8aa; font-size:14px; }
      .chip  { fill:#bfe8cf; font-size:14px; font-weight:600; }
      .lbl   { fill:#86c8a4; font-size:13px; font-weight:600; }
      .lblm  { fill:#9fb8aa; font-size:13px; }
      .note  { fill:#d7efe1; font-size:16px; }
      .noteb { fill:#cdeeda; font-size:16px; font-weight:700; }
    </style>
  </defs>

  <!-- canvas -->
  <rect x="2" y="2" width="1236" height="596" rx="22" fill="#0b1b13" stroke="#1f3d2e" stroke-width="2"/>

  <!-- header -->
  <text x="48" y="58" class="h">Self-hosting — what runs where</text>
  <text x="48" y="88" class="sub">Two pieces. Host each one wherever you like. The relay never sees your notes.</text>

  <!-- ============ Column A: You ============ -->
  <g>
    <rect x="48" y="180" width="250" height="190" rx="16" fill="#12281d" stroke="#244a37" stroke-width="1.5"/>
    <text x="173" y="150" text-anchor="middle" class="card-s">YOU &amp; YOUR TEAM</text>
    <!-- browser glyph -->
    <rect x="92" y="214" width="162" height="104" rx="10" fill="#0e2218" stroke="#2f6147" stroke-width="1.5"/>
    <rect x="92" y="214" width="162" height="26" rx="10" fill="#173527"/>
    <circle cx="106" cy="227" r="4" fill="#3b6e52"/>
    <circle cx="120" cy="227" r="4" fill="#3b6e52"/>
    <circle cx="134" cy="227" r="4" fill="#3b6e52"/>
    <rect x="108" y="256" width="130" height="9" rx="4.5" fill="#2a5740"/>
    <rect x="108" y="274" width="96" height="9" rx="4.5" fill="#21442f"/>
    <rect x="108" y="292" width="112" height="9" rx="4.5" fill="#21442f"/>
    <text x="173" y="345" text-anchor="middle" class="card-d">Browser or desktop app</text>
  </g>

  <!-- ============ Column B: Web app ============ -->
  <g>
    <rect x="430" y="120" width="330" height="310" rx="18" fill="#12281d" stroke="#2f6147" stroke-width="1.6"/>
    <text x="460" y="166" class="card-t">Web app</text>
    <text x="460" y="190" class="card-s">THE STATIC UI</text>
    <text x="460" y="222" class="card-d">A plain static bundle (HTML/JS/CSS).</text>
    <text x="460" y="244" class="card-d">No server logic — host it anywhere.</text>

    <text x="460" y="288" class="lbl">HOST IT ON</text>
    <g>
      <rect x="460" y="300" width="118" height="34" rx="17" fill="#15301f" stroke="#2f6147"/>
      <text x="519" y="322" text-anchor="middle" class="chip">Docker</text>
      <rect x="588" y="300" width="118" height="34" rx="17" fill="#15301f" stroke="#2f6147"/>
      <text x="647" y="322" text-anchor="middle" class="chip">Vercel</text>
      <rect x="460" y="344" width="118" height="34" rx="17" fill="#15301f" stroke="#2f6147"/>
      <text x="519" y="366" text-anchor="middle" class="chip">Netlify</text>
      <rect x="588" y="344" width="170" height="34" rx="17" fill="#15301f" stroke="#2f6147"/>
      <text x="673" y="366" text-anchor="middle" class="chip">Cloudflare Pages</text>
    </g>
    <text x="460" y="408" class="card-d">Auto-HTTPS on your own domain.</text>
  </g>

  <!-- ============ Column C: Relay ============ -->
  <g>
    <rect x="892" y="120" width="300" height="310" rx="18" fill="#12281d" stroke="#2f6147" stroke-width="1.6"/>
    <text x="922" y="166" class="card-t">Relay</text>
    <text x="922" y="190" class="card-s">THE ONLY SERVER</text>
    <text x="922" y="222" class="card-d">A tiny WebSocket service that</text>
    <text x="922" y="244" class="card-d">brokers P2P + optional sync.</text>

    <text x="922" y="288" class="lbl">HOST IT ON</text>
    <g>
      <rect x="922" y="300" width="110" height="34" rx="17" fill="#15301f" stroke="#2f6147"/>
      <text x="977" y="322" text-anchor="middle" class="chip">Docker</text>
      <rect x="1042" y="300" width="110" height="34" rx="17" fill="#15301f" stroke="#2f6147"/>
      <text x="1097" y="322" text-anchor="middle" class="chip">Fly.io</text>
      <rect x="922" y="344" width="110" height="34" rx="17" fill="#15301f" stroke="#2f6147"/>
      <text x="977" y="366" text-anchor="middle" class="chip">Railway</text>
      <rect x="1042" y="344" width="110" height="34" rx="17" fill="#15301f" stroke="#2f6147"/>
      <text x="1097" y="366" text-anchor="middle" class="chip">Render</text>
    </g>
    <text x="922" y="408" class="card-d">…or any VPS. Reads $PORT.</text>
  </g>

  <!-- ============ Arrows ============ -->
  <!-- A -> B : loads UI over HTTPS -->
  <path d="M306 250 L422 230" stroke="#34d399" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
  <text x="312" y="222" class="lbl">loads UI · HTTPS</text>

  <!-- A -> C : encrypted sync over WSS (curved under web app) -->
  <path d="M298 320 C 480 470, 700 470, 884 380" stroke="#34d399" stroke-width="2.2" fill="none" marker-end="url(#arrow)"/>
  <text x="486" y="494" class="lbl">encrypted sync · wss://…/signaling</text>

  <!-- B -> C : web app is pointed at the relay -->
  <path d="M762 250 L886 250" stroke="#6f8c7d" stroke-width="2" stroke-dasharray="5 5" fill="none" marker-end="url(#arrowMuted)"/>
  <text x="772" y="240" class="lblm">VITE_SIGNALING_URL</text>

  <!-- ============ Bottom privacy banner ============ -->
  <rect x="48" y="520" width="1144" height="56" rx="14" fill="#0e2a1c" stroke="#2f6147" stroke-width="1.5"/>
  <text x="74" y="554" class="noteb">🔒 End-to-end encrypted.</text>
  <text x="300" y="554" class="note">The relay only ever sees hashed room names and ciphertext — your notes are decrypted only on your devices.</text>
</svg>
